<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCST Smart Portal</title>
    <style>
        :root {
            --primary: #004080;
            --bg: #f4f6f9;
            --staff: #6a1b9a;
            --success: #27ae60;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--bg);
        }

        .container {
            padding: 20px;
            max-width: 450px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-top: 50px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            margin: 8px 0;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
    </style>
</head>

<body>
    <div id="loader"><b>Processing...</b></div>
    <div id="toast"></div>

    <div class="container">
        <div class="card">

            <div id="loginSection">
                <h2 id="loginTitle" style="color: var(--primary);">Student Login</h2>
                <input id="userId" placeholder="ID / Username">
                <input id="userPass" type="password" placeholder="Password">

                <div id="studentBox">
                    <button onclick="handleLogin()" style="background: var(--primary);">LOGIN</button>
                    <p style="margin: 15px 0 5px; color: #666; font-size: 0.9rem;">New here?</p>
                    <button onclick="showRegisterForm()"
                        style="background: var(--success); margin-top: 0;">REGISTER</button>
                </div>

                <div id="staffBox" class="hidden">
                    <button onclick="staffLogin()" style="background: var(--staff);">STAFF SIGN IN</button>
                </div>

                <p id="toggleText" onclick="togglePortal()"
                    style="color: #666; font-size: 0.85rem; cursor: pointer; margin-top: 15px;">Staff Access? Click Here
                </p>
            </div>

            <div id="registerSection" class="hidden">
                <h2 style="color: var(--success);">Create Account</h2>
                <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">Enter your details to register</p>

                <input id="regName" placeholder="Full Name">
                <input id="regId" placeholder="Desired Student ID">
                <input id="regPass" type="password" placeholder="Create Password">
                <input id="regProgram" placeholder="Program (e.g. Computer Science)">

                <button onclick="submitRegistration()" style="background: var(--success);">SUBMIT REGISTRATION</button>
                <button onclick="hideRegisterForm()" style="background: #666;">CANCEL</button>
            </div>

        </div>
    </div>

    <script>
        // Update this URL with your latest Apps Script deployment URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7MCBPqzDEy5u3h6AzHXZ6ectdLDE6uZI0fY43H1mcO4fOFL3iZTLiqVeaz8swnHxyig/exec";
        let isStaffMode = false;

        function notify(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // VIEW SWITCHING LOGIC
        function togglePortal() {
            isStaffMode = !isStaffMode;
            document.getElementById('loginTitle').innerText = isStaffMode ? "Staff Portal" : "Student Login";
            document.getElementById('studentBox').classList.toggle('hidden', isStaffMode);
            document.getElementById('staffBox').classList.toggle('hidden', !isStaffMode);
        }

        function showRegisterForm() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('hidden');
        }

        function hideRegisterForm() {
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        // AUTHENTICATION LOGIC
        async function handleLogin() {
            const id = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (!id || !pass) return notify("⚠️ Enter ID and Password");

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${id}&password=${pass}`);
                const data = await res.json();

                if (data.error) {
                    document.getElementById('loader').style.display = 'none';
                    notify("❌ " + data.error);
                } else {
                    // Fetch results immediately upon login
                    const resFetch = await fetch(`${SCRIPT_URL}?action=get_results&id=${id}`);
                    const resData = await resFetch.json();

                    localStorage.setItem('userData', JSON.stringify(data));
                    localStorage.setItem('userResults', JSON.stringify(resData.results));

                    document.getElementById('loader').style.display = 'none';
                    notify("✅ Welcome " + data.profile.name);

                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                notify("❌ Connection Failed.");
            }
        }

        async function staffLogin() {
            const user = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (!user || !pass) return notify("⚠️ Enter Staff Credentials");

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=staff_login&user=${user}&pass=${pass}`);
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';

                if (data.authorized) {
                    window.location.href = "accountant.html";
                } else {
                    notify("❌ " + data.error);
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                notify("❌ Verification failed.");
            }
        }

        // REGISTRATION FORM SUBMISSION
        async function submitRegistration() {
            const name = document.getElementById('regName').value.trim();
            const id = document.getElementById('regId').value.trim();
            const pass = document.getElementById('regPass').value;
            const program = document.getElementById('regProgram').value.trim();

            if (!name || !id || !pass || !program) {
                return notify("⚠️ Please fill all fields");
            }

            document.getElementById('loader').style.display = 'flex';
            try {
                const payload = {
                    action: 'register',
                    name: name,
                    id: id,
                    password: pass,
                    program: program
                };

                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                document.getElementById('loader').style.display = 'none';
                notify("✅ Registration Successful! You can now login.");
                hideRegisterForm(); // Return to login view
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                notify("❌ Registration Failed.");
            }
        }
    </script>
</body>

</html>
