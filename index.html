<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCST Smart Portal</title>
    <style>
        :root {
            --primary: #004080;
            --bg: #f4f6f9;
            --staff: #6a1b9a;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            padding: 20px;
            max-width: 450px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-top: 50px;
        }

        input {
            font-size: 16px !important;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            margin: 8px 0;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none;
        }

        /* Message Toast Styles */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            display: none;
            z-index: 10000;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
    </style>
</head>

<body>

    <div id="loader"><b>Processing...</b></div>
    <div id="toast"></div>

    <div class="container">
        <div class="card">
            <h2 id="loginTitle" style="color: var(--primary);">Student Login</h2>

            <input id="userId" type="text" placeholder="ID / Username">
            <input id="userPass" type="password" placeholder="Password">

            <div id="studentBox">
                <button onclick="handleLogin()" style="background: var(--primary);">LOGIN</button>
                <button onclick="handleRegister()" style="background: #27ae60;">CREATE ACCOUNT</button>
                <p><a href="#" onclick="forgotPassword()"
                        style="color: var(--primary); font-size: 0.85rem; text-decoration: none; margin-top: 10px; display: block;">Forgot
                        Password?</a></p>
            </div>

            <div id="staffBox" class="hidden">
                <button onclick="staffLogin()" style="background: var(--staff);">STAFF SIGN IN</button>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <p id="toggleText" onclick="togglePortal()"
                style="color: #666; font-size: 0.85rem; cursor: pointer; font-weight: bold;">
                Staff Access? Click Here
            </p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeIzjnFRnInJVTCBc-NwpZQMJY3z6xFY9ATFvi5ONfzpdztyLmOkQSi4G9TZ3J3p5TXw/exec";
        let isStaffMode = false;

        // Unified Notification System
        function notify(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        function togglePortal() {
            isStaffMode = !isStaffMode;
            document.getElementById('loginTitle').innerText = isStaffMode ? "Staff Portal" : "Student Login";
            document.getElementById('loginTitle').style.color = isStaffMode ? "var(--staff)" : "var(--primary)";
            document.getElementById('studentBox').classList.toggle('hidden', isStaffMode);
            document.getElementById('staffBox').classList.toggle('hidden', !isStaffMode);
            document.getElementById('toggleText').innerText = isStaffMode ? "Back to Student Login" : "Staff Access? Click Here";
        }

        async function handleLogin() {
            const id = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (!id || !pass) return notify("⚠️ Enter ID and Password");

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}&password=${encodeURIComponent(pass)}`);
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';

                if (data.error) {
                    notify("❌ " + data.error);
                } else {
                    notify("✅ Welcome " + data.profile.name);
                    localStorage.setItem('userData', JSON.stringify(data));
                    // Redirect to your dashboard page here
                    // window.location.href = "dashboard.html";
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                notify("❌ Connection Failed. Check internet.");
            }
        }

        async function handleRegister() {
            const id = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (!id || !pass) return notify("⚠️ Enter ID and Password to Register");

            document.getElementById('loader').style.display = 'flex';
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'register', id: id, password: pass })
                });
                document.getElementById('loader').style.display = 'none';
                notify("✅ Registration Sent! Try logging in now.");
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                notify("❌ Registration failed to send.");
            }
        }

        function staffLogin() {
            const user = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (user === "admin" && pass === "ccst2026") {
                window.location.href = "accountant.html";
            } else {
                notify("❌ Invalid Staff Credentials");
            }
        }

        function forgotPassword() {
            notify("ℹ️ Contact the IT Department to reset your password.");
        }
    </script>
</body>

</html>
