<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#004080">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>CCST Student Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #004080 0%, #1e2a44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #004080;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #004080 0%, #0066cc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #004080;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #004080 0%, #0066cc 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 64, 128, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .portal-links {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .portal-links button {
            flex: 1;
            padding: 12px;
            font-size: 0.9rem;
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
        }

        .portal-links button:hover {
            background: #eee;
            transform: none;
            box-shadow: none;
        }

        .portal-links button.accountant {
            background: #1e2a44;
            color: white;
            border-color: #1e2a44;
        }

        .portal-links button.accountant:hover {
            background: #2a3a5a;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #004080;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .offline-notice {
            background: #f39c12;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .offline-notice.show {
            display: block;
        }

        .install-banner {
            background: #27ae60;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            display: none;
            cursor: pointer;
        }

        .install-banner.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 1.6rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="offline-notice" id="offlineNotice">
            <i class="fas fa-wifi-slash"></i> You are offline. Some features may not work.
        </div>

        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>CCST Portal</h1>
            <p>Student Information System</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Student ID</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="studentId" placeholder="Enter your student ID" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="loginBtn">
                <span id="loginText">LOGIN</span>
                <span id="loginSpinner" class="spinner" style="display:none;"></span>
            </button>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Connecting...</p>
        </div>

        <div class="portal-links">
            <button onclick="window.location.href='dashboard.html'">
                <i class="fas fa-home"></i> Student Portal
            </button>
            <button class="accountant" onclick="window.location.href='accountant.html'">
                <i class="fas fa-user-tie"></i> Accountant
            </button>
        </div>

        <div class="install-banner" id="installBanner" onclick="installPWA()">
            <i class="fas fa-download"></i> Install App for Offline Use
        </div>
    </div>

    <script>
        // Configuration - Replace YOUR_SCRIPT_ID_HERE with your actual Google Apps Script Deployment ID
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuIbSc_QLyhR8Txs5gPcsvq_rTySSDYtJRxkW9znPhZefmIiwG7q2uEMhu1uJvgGLp/exec";
        let deferredPrompt;

        // Check online status
        function updateOnlineStatus() {
            const notice = document.getElementById('offlineNotice');
            if (!navigator.onLine) {
                notice.classList.add('show');
            } else {
                notice.classList.remove('show');
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // PWA Install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the A2HS prompt');
                    }
                    deferredPrompt = null;
                    document.getElementById('installBanner').classList.remove('show');
                });
            }
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();

            const studentId = document.getElementById('studentId').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const errorMsg = document.getElementById('errorMessage');

            if (!studentId || !password) {
                showError("Please enter both ID and password");
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            document.getElementById('loginSpinner').style.display = 'block';
            errorMsg.style.display = 'none';

            try {
                // Check if online
                if (!navigator.onLine) {
                    // Try offline login
                    const cachedData = localStorage.getItem('userData');
                    if (cachedData) {
                        const data = JSON.parse(cachedData);
                        if (data.profile && data.profile.id === studentId) {
                            window.location.href = 'dashboard.html';
                            return;
                        }
                    }
                    showError("You are offline. Please connect to login.");
                    return;
                }

                const response = await fetch(`${SCRIPT_URL}?id=${studentId}&password=${password}`);
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Save to localStorage
                localStorage.setItem('userData', JSON.stringify(data));
                localStorage.setItem('studentId', studentId);

                // Fetch results for dashboard
                try {
                    const resultsRes = await fetch(`${SCRIPT_URL}?action=get_results&id=${studentId}`);
                    const resultsData = await resultsRes.json();
                    if (resultsData.results) {
                        localStorage.setItem('userResults', JSON.stringify(resultsData.results));
                    }
                } catch (e) {
                    console.log('Could not fetch results:', e);
                }

                // Redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (e) {
                console.error('Login error:', e);
                showError("Connection error. Please try again.");
            } finally {
                loginBtn.disabled = false;
                loginText.style.display = 'block';
                document.getElementById('loginSpinner').style.display = 'none';
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';

            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        // Check if already logged in
        window.onload = function() {
            updateOnlineStatus();

            const userData = localStorage.getItem('userData');
            if (userData) {
                // Optionally auto-redirect to dashboard
                // window.location.href = 'dashboard.html';
            }

            // Register service worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            }
        };
    </script>
</body>
</html>
