<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCST Student Portal | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #6b8e23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(26, 71, 42, 0.4);
            width: 100%;
            max-width: 450px;
        }
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo h1 {
            color: #1a472a;
            font-size: 2rem;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a472a 0%, #6b8e23 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2.5rem;
        }
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .role-btn.active {
            border-color: #1a472a;
            background: #1a472a;
            color: white;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #1a472a;
        }
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1a472a 0%, #6b8e23 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
        }
        .error-message {
            color: #8b0000;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(139, 0, 0, 0.1);
            border-radius: 8px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top: 2px solid #1a472a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .register-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .register-btn {
            background: transparent;
            border: 2px solid #1a472a;
            color: #1a472a;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .register-btn:hover {
            background: #1a472a;
            color: white;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-container">
    <div class="logo">
        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>CCST Portal</h1>
        <p>Student Information System</p>
    </div>

    <div class="role-selector">
        <div class="role-btn active" id="studentRole" onclick="selectRole('student')">
            <i class="fas fa-user-graduate"></i> Student
        </div>
        <div class="role-btn" id="adminRole" onclick="selectRole('admin')">
            <i class="fas fa-user-tie"></i> Admin
        </div>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label id="idLabel">Student ID</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input id="loginId" placeholder="Enter your ID" required type="text">
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input id="password" placeholder="Enter your password" required type="password">
            </div>
        </div>
        <button id="loginBtn" type="submit">
            <span id="loginText">LOGIN</span>
            <span class="spinner" id="loginSpinner"></span>
        </button>
        <div class="error-message" id="errorMessage"></div>
    </form>

    <div class="register-section">
        <p>Don't have an account?</p>
        <button class="register-btn" onclick="openRegisterModal()">
            <i class="fas fa-user-plus"></i> Register
        </button>
    </div>
</div>

<script>
    // ============================================
    // UPDATE THIS WITH YOUR WEB APP URL
    // ============================================
    const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";
    
    let currentRole = 'student';

    function selectRole(role) {
        currentRole = role;
        const studentRole = document.getElementById('studentRole');
        const adminRole = document.getElementById('adminRole');
        const idLabel = document.getElementById('idLabel');
        const loginId = document.getElementById('loginId');

        if (role === 'student') {
            studentRole.classList.add('active');
            adminRole.classList.remove('active');
            idLabel.innerText = 'Student ID';
            loginId.placeholder = 'Enter your student ID';
        } else {
            adminRole.classList.add('active');
            studentRole.classList.remove('active');
            idLabel.innerText = 'Admin ID';
            loginId.placeholder = 'Enter admin ID';
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.innerText = msg;
        errorMsg.style.display = 'block';
        setTimeout(() => {
            errorMsg.style.display = 'none';
        }, 5000);
    }

    async function handleLogin(event) {
        event.preventDefault();

        const loginId = document.getElementById('loginId').value.trim();
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const loginSpinner = document.getElementById('loginSpinner');

        if (!loginId || !password) {
            showError('Please enter your ID and password.');
            return;
        }

        loginBtn.disabled = true;
        loginText.style.display = 'none';
        loginSpinner.style.display = 'inline-block';

        try {
            if (currentRole === 'admin') {
                // Admin login
                const response = await fetch(`${SCRIPT_URL}?action=staff_login&user=${encodeURIComponent(loginId)}&pass=${encodeURIComponent(password)}`);
                const data = await response.json();
                
                if (!data.authorized) {
                    showError(data.error || 'Invalid Credentials');
                    return;
                }
                localStorage.setItem('adminData', JSON.stringify({ role: 'admin', id: loginId }));
                window.location.href = 'accountant.html';
                return;
            }

            // Student login
            const response = await fetch(`${SCRIPT_URL}?action=login&id=${encodeURIComponent(loginId)}&password=${encodeURIComponent(password)}&role=student`);
            const data = await response.json();

            if (!data.success || !data.profile) {
                showError(data.error || 'Invalid ID or Password');
                return;
            }

            // Save student data to localStorage
            localStorage.setItem('studentId', data.profile.id);
            localStorage.setItem('studentName', data.profile.name);
            localStorage.setItem('studentData', JSON.stringify(data));
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
            
        } catch (error) {
            console.error('Login error:', error);
            showError('Connection error. Please try again.');
        } finally {
            loginBtn.disabled = false;
            loginText.style.display = 'inline';
            loginSpinner.style.display = 'none';
        }
    }

    function openRegisterModal() {
        alert('Registration: Please contact the academic office to get your student account.');
    }

    window.onload = function() {
        // Clear any existing session
        localStorage.removeItem('studentId');
        localStorage.removeItem('studentData');
        localStorage.removeItem('adminData');
    };
</script>
</body>
</html>
