<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCST Smart Portal</title>
    <style>
        :root {
            --primary: #004080;
            --bg: #f4f6f9;
            --staff: #6a1b9a;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--bg);
        }

        .container {
            padding: 20px;
            max-width: 450px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-top: 50px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            margin: 8px 0;
        }

        .hidden {
            display: none;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
    </style>
</head>

<body>
    <div id="loader"><b>Processing...</b></div>
    <div id="toast"></div>

    <div class="container">
        <div class="card">
            <h2 id="loginTitle" style="color: var(--primary);">Student Login</h2>
            <input id="userId" placeholder="ID / Username">
            <input id="userPass" type="password" placeholder="Password">

            <div id="studentBox">
                <button onclick="handleLogin()" style="background: var(--primary);">LOGIN</button>
                <button onclick="handleRegister()" style="background: #27ae60;">CREATE ACCOUNT</button>
            </div>

            <div id="staffBox" class="hidden">
                <button onclick="staffLogin()" style="background: var(--staff);">STAFF SIGN IN</button>
            </div>

            <p id="toggleText" onclick="togglePortal()"
                style="color: #666; font-size: 0.85rem; cursor: pointer; margin-top: 15px;">Staff Access? Click Here</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzY6qUwoVkeeA5rj_o-tMezUHSJMZuZDv097iy97d_1Bwcdhf-y999WsD95GVFwOQOfcg/exec";
        let isStaffMode = false;

        function notify(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        function togglePortal() {
            isStaffMode = !isStaffMode;
            document.getElementById('loginTitle').innerText = isStaffMode ? "Staff Portal" : "Student Login";
            document.getElementById('studentBox').classList.toggle('hidden', isStaffMode);
            document.getElementById('staffBox').classList.toggle('hidden', !isStaffMode);
        }

        async function handleLogin() {
            const id = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (!id || !pass) return notify("⚠️ Enter ID and Password");

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${id}&password=${pass}`);
                const data = await res.json();

                if (data.error) {
                    document.getElementById('loader').style.display = 'none';
                    notify("❌ " + data.error);
                } else {
                    // Fetch student results immediately after successful login
                    const resFetch = await fetch(`${SCRIPT_URL}?action=get_results&id=${id}`);
                    const resData = await resFetch.json();

                    localStorage.setItem('userData', JSON.stringify(data));
                    localStorage.setItem('userResults', JSON.stringify(resData.results));

                    document.getElementById('loader').style.display = 'none';
                    notify("✅ Welcome " + data.profile.name);
                    // window.location.href = "dashboard.html";
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                notify("❌ Connection Failed.");
            }
        }

        async function staffLogin() {
            const user = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            document.getElementById('loader').style.display = 'flex';
            try {
                // FIXED: Now uses secure backend verification
                const res = await fetch(`${SCRIPT_URL}?action=staff_login&user=${user}&pass=${pass}`);
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';
                if (data.authorized) window.location.href = "accountant.html";
                else notify("❌ " + data.error);
            } catch (e) { notify("❌ Verification failed."); }
        }

        async function handleRegister() {
            const id = document.getElementById('userId').value.trim();
            const pass = document.getElementById('userPass').value;
            if (!id || !pass) return notify("⚠️ Enter ID and Password");
            document.getElementById('loader').style.display = 'flex';
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'register', id, password: pass }) });
            document.getElementById('loader').style.display = 'none';
            notify("✅ Registration Sent!");
        }
    </script>
</body>

</html>
