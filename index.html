<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a472a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CCST Portal">
    <link rel="manifest" href="manifest.json">
    <title>CCST Student Portal | Central College of Science and Technology</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6b8e23;
            --primary-light: #9acd32;
            --primary-dark: #1a472a;
            --success: #556b2f;
            --danger: #8b0000;
            --warning: #daa520;
            --info: #9acd32;
            --bg: #f5f5dc;
            --text-dark: #2f4f2f;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        /* Detect device type */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0a2a1a 0%, #1a472a 50%, #2d6a3d 100%);
        }

        /* Mobile-first styles */
        @media (max-width: 480px) {
            body {
                padding: 15px;
                align-items: flex-start;
                padding-top: max(15px, env(safe-area-inset-top));
                padding-bottom: max(15px, env(safe-area-inset-bottom));
            }

            .login-container {
                padding: 25px 20px !important;
                border-radius: 20px !important;
                width: 100% !important;
                max-width: 100% !important;
                margin-top: 10px;
            }

            .logo h1 {
                font-size: 1.5rem !important;
            }

            .admission-banner {
                flex-direction: column !important;
                text-align: center !important;
                padding: 15px !important;
            }

            .banner-content {
                justify-content: center !important;
            }

            input {
                font-size: 16px !important; /* Prevent zoom on iOS */
                padding: 12px 14px 12px 40px !important;
            }

            button[type="submit"] {
                padding: 14px !important;
            }

            .role-selector {
                flex-direction: column !important;
                gap: 8px !important;
            }

            .role-btn {
                flex-direction: row !important;
                justify-content: flex-start !important;
                padding: 12px 15px !important;
            }

            .role-btn i {
                margin-bottom: 0 !important;
                margin-right: 10px !important;
            }
        }

        /* Tablet styles */
        @media (min-width: 481px) and (max-width: 768px) {
            .login-container {
                max-width: 450px;
                padding: 30px;
            }
        }

        /* Desktop styles */
        @media (min-width: 769px) {
            .login-container {
                max-width: 480px;
                padding: 40px;
            }
        }

        /* Animated Background from Welcome Page */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a2a1a 0%, #1a472a 50%, #2d6a3d 100%);
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(107, 142, 35, 0.15);
            border-radius: 50%;
            animation: floatAround 20s infinite ease-in-out;
        }

        .shape:nth-child(1) { width: 300px; height: 300px; top: -100px; left: -100px; animation-duration: 25s; }
        .shape:nth-child(2) { width: 200px; height: 200px; bottom: -50px; right: -50px; animation-duration: 20s; animation-delay: 2s; }
        .shape:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 10%; animation-duration: 18s; animation-delay: 1s; }
        .shape:nth-child(4) { width: 400px; height: 400px; bottom: 20%; right: -100px; animation-duration: 30s; animation-delay: 3s; }
        .shape:nth-child(5) { width: 100px; height: 100px; top: 20%; right: 15%; animation-duration: 15s; animation-delay: 0s; }
        .shape:nth-child(6) { width: 250px; height: 250px; bottom: 10%; left: 20%; animation-duration: 22s; animation-delay: 4s; }
        .shape:nth-child(7) { width: 80px; height: 80px; top: 60%; right: 30%; animation-duration: 12s; animation-delay: 1.5s; }
        .shape:nth-child(8) { width: 180px; height: 180px; top: 10%; right: 40%; animation-duration: 28s; animation-delay: 2.5s; }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(50px, -30px) rotate(45deg); }
            50% { transform: translate(-30px, 50px) rotate(90deg); }
            75% { transform: translate(40px, 40px) rotate(135deg); }
            100% { transform: translate(0, 0) rotate(180deg); }
        }

        /* Floating Gradient Orbs */
        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(154, 205, 50, 0.15), transparent 70%);
            border-radius: 50%;
            animation: pulse 8s infinite ease-in-out;
        }

        .orb-1 { top: -200px; left: -200px; animation-delay: 0s; }
        .orb-2 { bottom: -200px; right: -200px; animation-delay: 4s; width: 600px; height: 600px; }
        .orb-3 { top: 30%; right: 10%; width: 300px; height: 300px; animation-delay: 2s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Login Container */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(26, 71, 42, 0.4);
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Admission Banner */
            .admission-banner {
                background: linear-gradient(135deg, #1a472a, #6b8e23) !important;
                border-radius: 16px;
                padding: 18px 20px;
                margin-bottom: 25px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 15px;
                cursor: pointer;
                transition: all 0.3s;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

        .admission-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .banner-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .banner-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .banner-text h4 {
            color: white;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .banner-text p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.8rem;
        }

        .banner-btn {
            background: white;
            color: var(--primary-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        /* PULSE EFFECT FOR APPLY NOW BUTTON */
            @keyframes pulse {
            0% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            70% {
            transform: scale(1.08);
            box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
                }
            100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
                }
            }

        .banner-btn {
            background: white;
            color: var(--primary-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            animation: pulse 1.0s ease-in-out infinite;
        }

        .banner-btn:hover {
            transform: scale(1.05);
            background: var(--primary-light);
            color: white;
        }

        /* Logo Section */
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            color: var(--primary-dark);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 0.85rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 2rem;
            animation: pulseIcon 2s infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(107, 142, 35, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(107, 142, 35, 0); }
        }

        /* Role Selector */
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            color: #666;
        }

        .role-btn.active {
            border-color: var(--primary-dark);
            background: var(--primary-dark);
            color: white;
        }

        .role-btn:hover:not(.active) {
            border-color: var(--primary-dark);
            color: var(--primary-dark);
        }

        .role-btn i {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-dark);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 71, 42, 0.4);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(139, 0, 0, 0.1);
            border-radius: 8px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top: 2px solid var(--primary-dark);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Register Link */
        .register-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .register-section p {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .register-btn {
            background: transparent;
            border: 2px solid var(--primary-dark);
            color: var(--primary-dark);
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .register-btn:hover {
            background: var(--primary-dark);
            color: white;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: var(--primary-dark);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group button {
            flex: 1;
            padding: 12px;
        }

        .btn-cancel {
            background: #ccc !important;
        }

        /* Mobile responsive - Register section */
        @media (max-width: 480px) {
            .register-section {
                padding-top: 15px;
                margin-top: 15px;
            }

            .register-btn {
                width: 100%;
                padding: 14px;
            }

            .modal-content {
                padding: 20px;
                margin: 10px;
                width: calc(100% - 20px) !important;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group button {
                width: 100%;
            }
        }
    </style>

<body>

    <!-- Animated Background from Welcome Page -->
    <div class="animated-bg"></div>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="login-container">
        <!-- ADMISSION BANNER - New Applicant Link at the TOP -->
        <div class="admission-banner" onclick="window.location.href='admission.html'">
    <div class="banner-content">
        <div class="banner-icon">
            <img src="CCST LOGO.png" alt="CCST Logo" style="width: 32px; height: 32px; object-fit: contain;">
        </div>
            <div class="banner-text">
                <h4>🎓 New Applicant? Start Here</h4>
                <p>Apply for 2025/2026 Academic Year.</p>
            </div>
        </div>
            <button class="banner-btn">Apply Now →</button>
        </div>

        <div class="logo">
            <div class="logo-icon">
                <img src="CCST LOGO.png" alt="CCST Logo" style="width: 45px; height: 45px; object-fit: contain;">
            </div>
            <h1>CCST Portal</h1>
            <p>Student Information System</p>
        </div>

        <!-- Role Selector -->
                <div class="role-selector">
            <div class="role-btn active" id="studentRole" onclick="selectRole('student')">
                <i class="fas fa-user-graduate"></i>
                Student
            </div>
            <div class="role-btn" id="adminRole" onclick="selectRole('admin')">

        <div class="register-section">
            <p>Don't have an account?</p>
            <button class="register-btn" onclick="openRegisterModal()">
                <i class="fas fa-user-plus"></i> Register as New Student
            </button>
        </div>
    </div>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user-plus"></i> Student Registration</h2>
                <button class="modal-close" onclick="closeRegisterModal()">&times;</button>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="regId" placeholder="e.g., CCST/RM/24/001" required>
                </div>

                <div class="form-group">
                    <label>Program</label>
                    <input type="text" id="regProgram" placeholder="e.g., RM, RN, ML" required>
                </div>

                <div class="form-group">
                    <label>Level</label>
                    <input type="number" id="regLevel" placeholder="e.g., 100, 200, 300" required>
                </div>

                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                </div>

                <div class="btn-group">
                    <button type="submit" id="registerBtn" style="background: #27ae60;">
                        <span id="registerText">Register</span>
                        <span id="registerSpinner" class="spinner" style="border-top-color: white;"></span>
                    </button>
                    <button type="button" class="btn-cancel" onclick="closeRegisterModal()">Cancel</button>
                </div>

                <div class="error-message" id="registerError" style="margin-top: 15px;"></div>
            </form>
        </div>
    </div>

    <script>
        // Configuration - Your Google Apps Script URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0MHpQXoHzdA8ibojrzVdHu8BkrA3rMpw3p_eDsI2PRvIh2-RuoNyY9imxoE3XAJQY/exec";
        let deferredPrompt;
        let currentRole = 'student';

        // Particle Animation System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            const particleCount = 60;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.4 + 0.1,
                    color: `rgba(154, 205, 50, ${Math.random() * 0.3 + 0.1})`
                });
            }
        }

        function animateParticles() {
            if (!canvas) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            
            animationId = requestAnimationFrame(animateParticles);
        }

        function initParticles() {
            resizeCanvas();
            createParticles();
            animateParticles();
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            particles = [];
            createParticles();
        });

        // Select Role
                function selectRole(role) {
            currentRole = role;

            if (role === 'student') {
                document.getElementById('studentRole').classList.add('active');
                document.getElementById('adminRole').classList.remove('active');
                document.getElementById('executiveRole')?.classList.remove('active');
                document.getElementById('idLabel').innerText = 'Student ID';
                document.getElementById('loginId').placeholder = 'Enter your student ID';
            } else if (role === 'executive') {
                document.getElementById('executiveRole').classList.add('active');
                document.getElementById('studentRole').classList.remove('active');
                document.getElementById('adminRole').classList.remove('active');
                document.getElementById('idLabel').innerText = 'Executive ID';
                document.getElementById('loginId').placeholder = 'Enter executive username';
            } else {
                document.getElementById('adminRole').classList.add('active');
                document.getElementById('studentRole').classList.remove('active');
                document.getElementById('executiveRole')?.classList.remove('active');
                document.getElementById('idLabel').innerText = 'Staff ID';
                document.getElementById('loginId').placeholder = 'Enter staff ID';
            }
        }
