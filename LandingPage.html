<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a472a">
    <title>CCST | Central College of Science and Technology</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a2a1a 0%, #1a472a 50%, #2d6a3d 100%);
        }

        /* Animated Shapes / Particles */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            background: rgba(107, 142, 35, 0.15);
            border-radius: 50%;
            animation: floatAround 20s infinite ease-in-out;
        }

        .shape:nth-child(1) { width: 300px; height: 300px; top: -100px; left: -100px; animation-duration: 25s; }
        .shape:nth-child(2) { width: 200px; height: 200px; bottom: -50px; right: -50px; animation-duration: 20s; animation-delay: 2s; }
        .shape:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 10%; animation-duration: 18s; animation-delay: 1s; }
        .shape:nth-child(4) { width: 400px; height: 400px; bottom: 20%; right: -100px; animation-duration: 30s; animation-delay: 3s; }
        .shape:nth-child(5) { width: 100px; height: 100px; top: 20%; right: 15%; animation-duration: 15s; animation-delay: 0s; }
        .shape:nth-child(6) { width: 250px; height: 250px; bottom: 10%; left: 20%; animation-duration: 22s; animation-delay: 4s; }
        .shape:nth-child(7) { width: 80px; height: 80px; top: 60%; right: 30%; animation-duration: 12s; animation-delay: 1.5s; }
        .shape:nth-child(8) { width: 180px; height: 180px; top: 10%; right: 40%; animation-duration: 28s; animation-delay: 2.5s; }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(50px, -30px) rotate(45deg); }
            50% { transform: translate(-30px, 50px) rotate(90deg); }
            75% { transform: translate(40px, 40px) rotate(135deg); }
            100% { transform: translate(0, 0) rotate(180deg); }
        }

        /* Floating Gradient Orbs */
        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(154, 205, 50, 0.2), transparent 70%);
            border-radius: 50%;
            animation: pulse 8s infinite ease-in-out;
        }

        .orb-1 { top: -200px; left: -200px; animation-delay: 0s; }
        .orb-2 { bottom: -200px; right: -200px; animation-delay: 4s; width: 600px; height: 600px; }
        .orb-3 { top: 30%; right: 10%; width: 300px; height: 300px; animation-delay: 2s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Main Content */
        .welcome-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        /* College Logo / Icon */
        .college-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ffffff, #f0f4e8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 8px rgba(107, 142, 35, 0.3);
            animation: iconPulse 2s infinite ease-in-out;
        }

        .college-icon i {
            font-size: 4rem;
            color: #1a472a;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 8px rgba(107, 142, 35, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 0 12px rgba(107, 142, 35, 0.5); }
        }

        /* College Name */
        .college-name {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            margin-bottom: 15px;
            animation: fadeInUp 1.2s ease;
        }

        @media (max-width: 768px) {
            .college-name { font-size: 2rem; }
        }

        .college-name span {
            color: #9acd32;
            display: inline-block;
        }

        /* Motto */
        .motto {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-style: italic;
            animation: fadeInUp 1.4s ease;
        }

        /* Address */
        .address {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1.6s ease;
        }

        .address-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        .address-item i {
            color: #9acd32;
        }

        /* Divider */
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #9acd32, #6b8e23, #9acd32, transparent);
            margin: 20px auto;
            animation: fadeInUp 1.8s ease;
        }

        /* Start Button */
        .start-btn {
            background: linear-gradient(135deg, #6b8e23, #1a472a);
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
            animation: fadeInUp 2s ease;
            position: relative;
            overflow: hidden;
        }

        .start-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover:before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #7da329, #2a5a2a);
        }

        .start-btn i {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .start-btn:hover i {
            transform: translateX(8px);
        }

        /* Floating Text Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scroll Hint */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
            50% { transform: translateX(-50%) translateY(10px); opacity: 1; }
        }

        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="animated-bg"></div>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Particle Canvas for additional effect -->
    <canvas id="particleCanvas"></canvas>

    <!-- Main Welcome Content -->
    <div class="welcome-container">
        <div class="college-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>
        
        <h1 class="college-name">
            CENTRAL COLLEGE OF <span>SCIENCE</span> AND <span>TECHNOLOGY</span>
        </h1>
        
        <div class="motto">
            <i class="fas fa-quote-left"></i> Knowledge, Service, Security <i class="fas fa-quote-right"></i>
        </div>
        
        <div class="divider"></div>
        
        <div class="address">
            <div class="address-item">
                <i class="fas fa-map-marker-alt"></i> P. O. Box SW 834, Agona Swedru - Ghana
            </div>
            <div class="address-item">
                <i class="fas fa-phone"></i> +233 (0) 20 445 9722
            </div>
            <div class="address-item">
                <i class="fas fa-envelope"></i> info@centralcollegegh.com
            </div>
        </div>
        
        <button class="start-btn" id="startJourneyBtn">
            <i class="fas fa-hand-peace"></i> Tap to Start Your Journey
            <i class="fas fa-arrow-right"></i>
        </button>
        
        <div class="scroll-hint" onclick="startJourney()">
            <i class="fas fa-chevron-down"></i>
            <span>Begin</span>
        </div>
    </div>

    <script>
        // Particle Animation System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            const particleCount = 80;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5 + 0.2,
                    color: `rgba(154, 205, 50, ${Math.random() * 0.4 + 0.2})`
                });
            }
        }

        function animateParticles() {
            if (!canvas) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                p.x += p.speedX;
                p.y += p.speedY;
                
                // Wrap around edges
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            
            animationId = requestAnimationFrame(animateParticles);
        }

        function initParticles() {
            resizeCanvas();
            createParticles();
            animateParticles();
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            particles = [];
            createParticles();
        });

        // Start journey function - redirect to admission portal
        function startJourney() {
            // Add click animation
            const btn = document.getElementById('startJourneyBtn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 200);
            
            // Redirect to admission portal (index.html or admission.html)
            // You can change this to your admission form page
            window.location.href = 'index.html';
        }

        // Add event listener to button
        document.getElementById('startJourneyBtn').addEventListener('click', startJourney);
        
        // Also allow click on the scroll hint
        document.querySelector('.scroll-hint').addEventListener('click', startJourney);
        
        // Add keyboard support (press Enter or Space)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                startJourney();
            }
        });
        
        // Initialize particles on load
        window.addEventListener('load', () => {
            initParticles();
            
            // Add a small delay to ensure smooth animation
            setTimeout(() => {
                const elements = document.querySelectorAll('.college-name, .motto, .address, .start-btn');
                elements.forEach(el => {
                    el.style.opacity = '1';
                });
            }, 100);
        });
        
        // Cleanup animation on page unload
        window.addEventListener('beforeunload', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
    </script>
</body>
</html>
