<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Tool | CCST</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background: #004080;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .course-row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        hr {
            margin: 20px 0;
            border: 0;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2 style="color: #004080;">Academic & Finance Control</h2>
        <input id="searchId" placeholder="Enter Student ID">
        <button onclick="search()">SEARCH STUDENT</button>

        <div id="result" style="display:none; margin-top: 20px;">
            <h3 id="resName"></h3>
            <p id="resInfo"></p>
            <button id="toggleBtn" onclick="toggleStatus()"></button>

            <hr>
            <h4>Upload Detailed Results</h4>
            <input id="resSemester" placeholder="Semester (e.g. Semester 1 2024)">
            <input id="resGPA" placeholder="Overall GPA">

            <div id="courseInputs">
                <div class="course-row">
                    <input class="cName" placeholder="Course Name" style="flex:2">
                    <input class="cGrade" placeholder="Grade" style="flex:1">
                </div>
            </div>
            <button onclick="addCourseRow()" style="background:#666; font-size:12px; padding:5px; width:auto;">+ Add
                Course</button>
            <button onclick="uploadResults()" style="background: #27ae60; margin-top:20px;">UPLOAD ALL RESULTS</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7MCBPqzDEy5u3h6AzHXZ6ectdLDE6uZI0fY43H1mcO4fOFL3iZTLiqVeaz8swnHxyig/exec";
        let currentStudent = null;

        async function search() {
            const id = document.getElementById('searchId').value.trim();
            const res = await fetch(`${SCRIPT_URL}?action=accountant_search&id=${id}`);
            const data = await res.json();
            if (data.error) return alert(data.error);
            currentStudent = data;
            document.getElementById('result').style.display = 'block';
            document.getElementById('resName').innerText = data.name;
            document.getElementById('resInfo').innerText = `${data.program} | Level ${data.level}`;
            updateUI(data.isCleared);
        }

        function updateUI(s) {
            const btn = document.getElementById('toggleBtn');
            btn.innerText = s ? "✅ FINANCIALLY CLEARED" : "❌ NOT CLEARED";
            btn.style.background = s ? "#27ae60" : "#e74c3c";
        }

        function addCourseRow() {
            const div = document.createElement('div');
            div.className = "course-row";
            div.innerHTML = `<input class="cName" placeholder="Course Name" style="flex:2"><input class="cGrade" placeholder="Grade" style="flex:1">`;
            document.getElementById('courseInputs').appendChild(div);
        }

        async function uploadResults() {
            const sem = document.getElementById('resSemester').value;
            const gpa = document.getElementById('resGPA').value;
            const names = document.getElementsByClassName('cName');
            const grades = document.getElementsByClassName('cGrade');

            let courses = [];
            for (let i = 0; i < names.length; i++) {
                if (names[i].value) courses.push({ name: names[i].value, grade: grades[i].value });
            }

            const payload = {
                action: 'upload_results',
                id: currentStudent.id,
                semester: sem,
                gpa: gpa,
                details: JSON.stringify(courses)
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Results Uploaded!");
            location.reload();
        }
    </script>
</body>

</html>
