<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Portal | CCST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5dc;
            background-image: radial-gradient(circle, rgba(107, 142, 35, 0.1) 1px, transparent 1px);
            background-size: 8px 8px;
            display: flex;
            min-height: 100vh;
            color: #2f4f2f;
        }
        .sidebar {
            width: 280px;
            background: #1a472a;
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(135deg, #6b8e23 0%, #1a472a 100%);
        }
        .menu-item {
            padding: 14px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(107, 142, 35, 0.3);
            color: white;
            border-left-color: #9acd32;
        }
        .menu-item i { width: 24px; color: #9acd32; }
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 25px;
        }
        .navbar {
            background: linear-gradient(135deg, #1a472a 0%, #6b8e23 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(26, 71, 42, 0.15);
            margin-bottom: 25px;
            border: 2px solid rgba(107, 142, 35, 0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #6b8e23;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(107, 142, 35, 0.2);
        }
        .stat-card h3 { font-size: 2rem; color: #6b8e23; }
        input, button, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(107, 142, 35, 0.3);
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #6b8e23 0%, #1a472a 100%);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .success-btn { background: linear-gradient(135deg, #556b2f 0%, #6b8e23 100%); }
        .danger-btn { background: #8b0000; }
        .section { display: none; }
        .section.active { display: block; }
        .student-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(107, 142, 35, 0.1);
        }
        .status-cleared { color: #556b2f; font-weight: bold; }
        .status-not { color: #8b0000; font-weight: bold; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a472a;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 10000;
            display: none;
        }
        hr { margin: 20px 25px; border-color: rgba(255,255,255,0.1); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-user-tie"></i> Accountant</h2>
        <p style="font-size:0.85rem;">Financial & Academic Control</p>
    </div>
    <div class="menu-item active" onclick="showSection('search')">
        <i class="fas fa-search"></i> Search Student
    </div>
    <div class="menu-item" onclick="showSection('clearance')">
        <i class="fas fa-check-circle"></i> Financial Clearance
    </div>
    <div class="menu-item" onclick="showSection('reports')">
        <i class="fas fa-chart-bar"></i> Reports
    </div>
    <hr>
    <div class="menu-item" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </div>
</div>

<div class="main-content">
    <div class="navbar">
        <h3 id="pageTitle">Search Student</h3>
        <div><i class="fas fa-user-tie"></i> CCST Accountant</div>
    </div>

    <!-- Search Section -->
    <div id="searchSection" class="section active">
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3 id="totalStudents">0</h3><p>Total Students</p></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><h3 id="clearedStudents">0</h3><p>Cleared</p></div>
            <div class="stat-card"><i class="fas fa-exclamation-circle"></i><h3 id="pendingStudents">0</h3><p>Pending</p></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-search"></i> Search Student by ID</h3>
            <div style="display: flex; gap: 10px;">
                <input id="searchId" placeholder="Enter Student ID" style="flex: 1;">
                <button onclick="searchStudent()" style="width: auto;"><i class="fas fa-search"></i> Search</button>
            </div>
            <div id="studentResult" style="display:none; margin-top:25px;">
                <div style="background:#f8f9fa; padding:20px; border-radius:10px;">
                    <h3 id="resName" style="color:#6b8e23;"></h3>
                    <p id="resInfo"></p>
                    <button id="toggleBtn" onclick="toggleClearance()"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Clearance Section -->
    <div id="clearanceSection" class="section">
        <div class="card">
            <h3><i class="fas fa-check-circle"></i> Financial Clearance Management</h3>
            <div style="display: flex; gap: 10px; margin: 15px 0;">
                <input id="clearanceId" placeholder="Student ID" style="flex:1;">
                <button onclick="clearStudentById()" class="success-btn"><i class="fas fa-check"></i> CLEAR</button>
                <button onclick="unclearStudentById()" class="danger-btn"><i class="fas fa-times"></i> UNCLEAR</button>
            </div>
            <div id="clearanceList"></div>
        </div>
    </div>

    <!-- Reports Section -->
    <div id="reportsSection" class="section">
        <div class="card">
            <h3><i class="fas fa-chart-bar"></i> Generate Reports</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <button onclick="generateReport('clearance')">Clearance Report</button>
                <button onclick="generateReport('financial')">Financial Report</button>
                <button onclick="generateReport('summary')">Summary Report</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweo7owJHkP0l4rfyIheCyXZPK-gjN-hwm2bBuPYz_GAUww5LyN9kFIjaNbXEHEc6Cg/exec";
    let currentStudent = null;
    let allStudents = [];

    function showSection(section) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(section + 'Section').classList.add('active');
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        const titles = { search: 'Search Student', clearance: 'Financial Clearance', reports: 'Reports' };
        document.getElementById('pageTitle').innerText = titles[section] || 'Dashboard';
        
        if (section === 'clearance') loadStudentList();
    }

    function showToast(msg, type = 'info') {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${msg}`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function searchStudent() {
        const id = document.getElementById('searchId').value.trim();
        if (!id) return showToast("Please enter Student ID", "warning");
        
        try {
            const response = await fetch(`${SCRIPT_URL}?action=get_student_data&id=${id}`);
            const data = await response.json();
            
            if (!data.success || !data.profile) {
                showToast(data.error || "Student Not Found", "danger");
                document.getElementById('studentResult').style.display = 'none';
                return;
            }
            
            currentStudent = data.profile;
            document.getElementById('studentResult').style.display = 'block';
            document.getElementById('resName').innerText = currentStudent.name;
            document.getElementById('resInfo').innerHTML = `${currentStudent.program} | Level ${currentStudent.level} | ID: ${currentStudent.id}<br>Balance: GHS ${(currentStudent.balance || 0).toLocaleString()}`;
            
            const isCleared = currentStudent.isCleared === true || currentStudent.isCleared === "TRUE";
            const btn = document.getElementById('toggleBtn');
            btn.innerText = isCleared ? "✓ FINANCIALLY CLEARED" : "✗ MARK AS CLEARED";
            btn.style.background = isCleared ? "#556b2f" : "#8b0000";
            
        } catch (error) {
            showToast("Error connecting to server", "danger");
        }
    }

    async function toggleClearance() {
        if (!currentStudent) return;
        const newStatus = !(currentStudent.isCleared === true || currentStudent.isCleared === "TRUE");
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'toggle_clearance', id: currentStudent.id, cleared: newStatus })
            });
            currentStudent.isCleared = newStatus;
            const btn = document.getElementById('toggleBtn');
            btn.innerText = newStatus ? "✓ FINANCIALLY CLEARED" : "✗ MARK AS CLEARED";
            btn.style.background = newStatus ? "#556b2f" : "#8b0000";
            showToast(newStatus ? "Student cleared!" : "Clearance removed", "success");
            loadStudentList();
        } catch (error) {
            showToast("Failed to update clearance", "danger");
        }
    }

    async function clearStudentById() {
        const id = document.getElementById('clearanceId').value.trim();
        if (!id) return showToast("Enter Student ID", "warning");
        await performClearance(id, true);
    }

    async function unclearStudentById() {
        const id = document.getElementById('clearanceId').value.trim();
        if (!id) return showToast("Enter Student ID", "warning");
        await performClearance(id, false);
    }

    async function performClearance(id, cleared) {
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'toggle_clearance', id: id, cleared: cleared })
            });
            showToast(`Student ${cleared ? 'cleared' : 'uncleared'}`, "success");
            loadStudentList();
            document.getElementById('clearanceId').value = '';
        } catch (error) {
            showToast("Operation failed", "danger");
        }
    }

    async function loadStudentList() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=get_all_students`);
            const data = await response.json();
            
            if (data.students) {
                allStudents = data.students;
                let cleared = 0;
                let html = '<div class="student-list-container">';
                allStudents.forEach(student => {
                    const isCleared = student.isCleared === true || student.isCleared === "TRUE";
                    if (isCleared) cleared++;
                    html += `
                        <div class="student-list-item">
                            <div>
                                <strong>${student.name}</strong><br>
                                <small>${student.id} | ${student.program} | Level ${student.level}</small>
                            </div>
                            <span class="${isCleared ? 'status-cleared' : 'status-not'}">
                                ${isCleared ? '✓ CLEARED' : '✗ PENDING'}
                            </span>
                        </div>
                    `;
                });
                html += '</div>';
                document.getElementById('clearanceList').innerHTML = html;
                document.getElementById('totalStudents').innerText = allStudents.length;
                document.getElementById('clearedStudents').innerText = cleared;
                document.getElementById('pendingStudents').innerText = allStudents.length - cleared;
            }
        } catch (error) {
            document.getElementById('clearanceList').innerHTML = '<p style="text-align:center; color:#999;">Error loading students</p>';
        }
    }

    function generateReport(type) {
        showToast(`Generating ${type} report...`, "info");
    }

    function logout() {
        if (confirm("Logout from Accountant Portal?")) {
            localStorage.removeItem('adminData');
            window.location.href = "index.html";
        }
    }

    window.onload = function() {
        showSection('search');
        loadStudentList();
    };
</script>
</body>
</html>
