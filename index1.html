<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCST Student Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* [cite: 52] Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #6b8e23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(26, 71, 42, 0.4);
            width: 100%;
            max-width: 450px;
        }
        
        /* NEW: Loading Spinner Styles */
        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin: -10px 0 0 -10px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        input, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #e0e0e0; }
        button { background: #1a472a; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1>CCST Portal</h1></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="text" id="studentId" placeholder="Student ID" required>
            <button type="submit" id="loginBtn">Login</button>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const id = document.getElementById('studentId').value;
            
            // Start Loading
            btn.classList.add('btn-loading');
            btn.disabled = true;

            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbxM7aa5hj1MtCJB6YdwjG8iHq4C8_2ry1ddGirBvYKRHjv-jD2OBKqHOSm1cO9QB2e_/exec'?action=student_login&id=${id}`);
                const data = await response.json();
                if (data.authorized) {
                    localStorage.setItem('userData', JSON.stringify(data));
                    window.location.href = "dashboard.html";
                } else {
                    alert("Invalid ID");
                }
            } catch (err) {
                alert("Connection error");
            } finally {
                // Stop Loading
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
