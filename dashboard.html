<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary:#6b8e23;
    --primary-dark:#1a472a;
    --success:#2ecc71;
    --danger:#e74c3c;
    --warning:#f39c12;
}

/* ===== BUTTON LOADING ===== */
.btn-loading {
    pointer-events: none;
    opacity: 0.7;
    position: relative;
}
.btn-loading::after {
    content:"";
    width:18px;
    height:18px;
    border:2px solid #fff;
    border-top:2px solid transparent;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:spin .6s linear infinite;
}
@keyframes spin {
    0%{transform:translate(-50%,-50%) rotate(0deg);}
    100%{transform:translate(-50%,-50%) rotate(360deg);}
}

/* ===== FINANCE ===== */
.finance-summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}
.finance-card{
    padding:20px;
    border-radius:10px;
    color:white;
    text-align:center;
}
.finance-card.total{background:linear-gradient(135deg,#1a472a,#6b8e23);}
.finance-card.paid{background:linear-gradient(135deg,#2ecc71,#27ae60);}
.finance-card.balance{background:linear-gradient(135deg,#e74c3c,#c0392b);}
.finance-card.arrears{background:linear-gradient(135deg,#8e44ad,#c39bd3);}
</style>
</head>

<body>

<h2>Financial Summary</h2>

<div class="finance-summary">
    <div class="finance-card total">
        <h4>Total Fee</h4>
        <h2 id="totalFee">GH₵0.00</h2>
    </div>

    <div class="finance-card paid">
        <h4>Paid</h4>
        <h2 id="amountPaid">GH₵0.00</h2>
    </div>

    <div class="finance-card balance">
        <h4>Balance</h4>
        <h2 id="balance">GH₵0.00</h2>
    </div>

    <!-- NEW ARREARS -->
    <div class="finance-card arrears">
        <h4>Arrears</h4>
        <h2 id="arrears">GH₵0.00</h2>
    </div>
</div>

<br><br>

<button onclick="testAction(this)">Test Button</button>

<script>
/* =========================
   GLOBAL BUTTON LOADING
========================= */
document.addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    if(btn.classList.contains("btn-loading")) return;

    btn.classList.add("btn-loading");

    setTimeout(()=>{
        btn.classList.remove("btn-loading");
    },2000);
});

/* =========================
   SAMPLE DATA (Replace with your backend)
========================= */
let studentData = {
    finance:{
        totalFee: 5000,
        amountPaid: 3500,
        arrears: 1200   // <-- from Google Sheets (or computed)
    }
};

/* =========================
   LOAD FINANCE
========================= */
function loadFinance(){
    const f = studentData.finance;

    const total = Number(f.totalFee || 0);
    const paid = Number(f.amountPaid || 0);

    const balance = total - paid;

    // Arrears logic
    const arrears = Number(f.arrears || 0);

    document.getElementById("totalFee").innerText = `GH₵${total.toFixed(2)}`;
    document.getElementById("amountPaid").innerText = `GH₵${paid.toFixed(2)}`;
    document.getElementById("balance").innerText = `GH₵${balance.toFixed(2)}`;
    document.getElementById("arrears").innerText = `GH₵${arrears.toFixed(2)}`;
}

loadFinance();

/* =========================
   TEST BUTTON FUNCTION
========================= */
function testAction(btn){
    btn.classList.add("btn-loading");

    setTimeout(()=>{
        alert("Action completed");
        btn.classList.remove("btn-loading");
    },1500);
}
</script>

</body>
</html>
